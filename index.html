<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Netflix Clone Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #141414;
      color: white;
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      background: rgba(0,0,0,0.9);
      z-index: 100;
    }

    .logo {
      color: #e50914;
      font-size: 24px;
      font-weight: bold;
    }

    input {
      padding: 8px;
      border-radius: 4px;
      border: none;
      outline: none;
    }

    .hero {
      margin-top: 60px;
      height: 70vh;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: flex-end;
      padding: 40px;
    }

    .hero-content h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .buttons button {
      padding: 10px 20px;
      margin-right: 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .play { background: white; color: black; }
    .info { background: rgba(109,109,110,0.7); color: white; }

    .row {
      margin: 20px;
    }

    .row h2 {
      margin-bottom: 10px;
    }

    .row-posters {
      display: flex;
      overflow-x: auto;
      gap: 10px;
    }

    .poster {
      min-width: 150px;
      height: 225px;
      flex-shrink: 0;
      border-radius: 5px;
      overflow: hidden;
      transition: transform 0.3s;
    }

    .poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .poster:hover {
      transform: scale(1.15);
    }

    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>

<header>
  <div class="logo">NETFLIX</div>
  <input type="text" id="search" placeholder="Buscar...">
</header>

<section class="hero" id="hero"></section>

<section class="row">
  <h2>Populares</h2>
  <div class="row-posters" id="movies"></div>
</section>

<script>
const API_KEY = "TU_API_KEY_AQUI";
const BASE_URL = "https://api.themoviedb.org/3";
const IMG_URL = "https://image.tmdb.org/t/p/original";
const SEARCH_URL = `${BASE_URL}/search/movie?api_key=${API_KEY}&query=`;
const POPULAR_URL = `${BASE_URL}/movie/popular?api_key=${API_KEY}`;

const moviesContainer = document.getElementById("movies");
const hero = document.getElementById("hero");
const search = document.getElementById("search");

async function getMovies(url) {
  const res = await fetch(url);
  const data = await res.json();
  showMovies(data.results);
  setHero(data.results[0]);
}

function setHero(movie) {
  hero.style.backgroundImage = `url(${IMG_URL + movie.backdrop_path})`;
  hero.innerHTML = `
    <div class="hero-content">
      <h1>${movie.title}</h1>
      <div class="buttons">
        <button class="play">▶ Play</button>
        <button class="info">Más info</button>
      </div>
    </div>
  `;
}

function showMovies(movies) {
  moviesContainer.innerHTML = "";

  movies.forEach(movie => {
    if (!movie.poster_path) return;

    const div = document.createElement("div");
    div.classList.add("poster");

    div.innerHTML = `<img src="https://image.tmdb.org/t/p/w300${movie.poster_path}">`;

    moviesContainer.appendChild(div);
  });
}

search.addEventListener("input", () => {
  const query = search.value;
  if (query) {
    getMovies(SEARCH_URL + query);
  } else {
    getMovies(POPULAR_URL);
  }
});

getMovies(POPULAR_URL);
</script>

</body>
</html>
