<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Netflix Clone</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #141414;
      color: white;
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
      z-index: 100;
    }

    .logo {
      color: #e50914;
      font-size: 28px;
      font-weight: bold;
    }

    .hero {
      height: 80vh;
      background: url('https://image.tmdb.org/t/p/original/9yBVqNruk6Ykrwc32qrK2TIE5xw.jpg') center/cover;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px;
    }

    .hero h1 {
      font-size: 60px;
      margin-bottom: 20px;
    }

    .buttons button {
      padding: 10px 20px;
      margin-right: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .play { background: white; color: black; }
    .info { background: rgba(109,109,110,0.7); color: white; }

    .row {
      margin: 20px;
    }

    .row h2 {
      margin-bottom: 10px;
    }

    .row-posters {
      display: flex;
      overflow-x: auto;
      gap: 10px;
    }

    .poster {
      width: 150px;
      transition: transform 0.3s;
      cursor: pointer;
    }

    .poster:hover {
      transform: scale(1.2);
    }

    .poster img {
      width: 100%;
      border-radius: 5px;
    }

    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>

<header>
  <div class="logo">NETFLIX</div>
</header>

<section class="hero">
  <h1>Interstellar</h1>
  <div class="buttons">
    <button class="play">▶ Play</button>
    <button class="info">Más info</button>
  </div>
</section>

<section class="row">
  <h2>Populares</h2>
  <div class="row-posters" id="movies"></div>
</section>

<script>
const movies = [
  "qJ2tW6WMUDux911r6m7haRef0WH.jpg",
  "rAiYTfKGqDCRIIqo664sY9XZIvQ.jpg",
  "qmDpIHrmpJINaRKAfWQfftjCdyi.jpg",
  "xBHvZcjRiWyobQ9kxBhO6B2dtRI.jpg",
  "s3TBrRGB1iav7gFOCNx3H31MoES.jpg"
];

const container = document.getElementById("movies");

movies.forEach(img => {
  const div = document.createElement("div");
  div.classList.add("poster");

  div.innerHTML = `<img src="https://image.tmdb.org/t/p/w300/${img}">`;

  container.appendChild(div);
});
</script>

</body>
</html>
