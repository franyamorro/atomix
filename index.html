<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netflix Clone PRO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial;background:#141414;color:#fff}

header{position:fixed;top:0;width:100%;display:flex;justify-content:space-between;align-items:center;padding:15px 40px;background:rgba(0,0,0,.9);z-index:100}
.logo{color:#e50914;font-size:24px;font-weight:bold}
input{padding:8px;border-radius:4px;border:none}

.hero{margin-top:60px;height:70vh;background-size:cover;background-position:center;display:flex;align-items:flex-end;padding:40px}
.hero h1{font-size:48px}

.row{margin:20px}
.row h2{margin-bottom:10px}
.row-posters{display:flex;overflow-x:auto;gap:10px}

.poster{min-width:150px;height:225px;border-radius:6px;overflow:visible;position:relative}
.poster-inner{width:100%;height:100%;border-radius:6px;overflow:hidden;transition:transform .3s, box-shadow .3s}
.poster img{width:100%;height:100%;object-fit:cover}

.info{position:absolute;bottom:0;width:100%;padding:8px;font-size:12px;background:linear-gradient(transparent,rgba(0,0,0,.9))}

.hover-card{
  position:absolute;
  top:-20px;
  left:-20px;
  width:190px;
  background:#181818;
  border-radius:8px;
  opacity:0;
  transform:scale(.8);
  transition:.25s;
  z-index:10;
  pointer-events:none;
}

.hover-card img{width:100%;border-radius:8px 8px 0 0}
.hover-content{padding:10px;font-size:12px}

.poster:hover .poster-inner{
  transform:scale(1.05);
}

.poster:hover .hover-card{
  opacity:1;
  transform:scale(1);
  pointer-events:auto;
}

.fav{position:absolute;top:5px;right:5px;background:red;border:none;border-radius:50%;color:#fff;width:25px;height:25px;cursor:pointer;z-index:20}

.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);display:none;justify-content:center;align-items:center;z-index:200}
.modal iframe{width:80%;height:60%}

::-webkit-scrollbar{display:none}
</style>
</head>
<body>

<header>
<div class="logo">NETFLIX</div>
<input type="text" id="search" placeholder="Buscar...">
</header>

<section class="hero" id="hero"></section>
<div id="rows"></div>

<div class="modal" id="modal" onclick="closeModal()">
<iframe id="trailer" frameborder="0" allowfullscreen></iframe>
</div>

<script>
const API_KEY="fb3f3ff8524699ce1075d2c77f1c7f88";
const BASE="https://api.themoviedb.org/3";
const IMG="https://image.tmdb.org/t/p/w300";

const categories=[
{name:"Populares",url:`${BASE}/movie/popular?api_key=${API_KEY}`},
{name:"Acción",url:`${BASE}/discover/movie?api_key=${API_KEY}&with_genres=28`},
{name:"Comedia",url:`${BASE}/discover/movie?api_key=${API_KEY}&with_genres=35`}
];

const rowsContainer=document.getElementById("rows");
const hero=document.getElementById("hero");
const search=document.getElementById("search");

async function fetchData(url){
const res=await fetch(url);
return await res.json();
}

function setHero(movie){
hero.style.backgroundImage=`url(https://image.tmdb.org/t/p/original${movie.backdrop_path})`;
hero.innerHTML=`<h1>${movie.title}</h1>`;
}

function createRow(title,movies){
const section=document.createElement("section");
section.classList.add("row");
section.innerHTML=`<h2>${title}</h2><div class="row-posters"></div>`;

const container=section.querySelector(".row-posters");

movies.forEach(m=>{
if(!m.poster_path)return;

const div=document.createElement("div");
div.classList.add("poster");

div.innerHTML=`
<div class="poster-inner">
<img src="${IMG+m.poster_path}">
<div class="info">
<p>${m.title}</p>
<p>⭐ ${m.vote_average}</p>
</div>
</div>

<div class="hover-card">
<img src="${IMG+m.poster_path}">
<div class="hover-content">
<strong>${m.title}</strong>
<p>⭐ ${m.vote_average}</p>
</div>
</div>

<button class="fav">❤</button>
`;

div.onclick=()=>openTrailer(m.id);

div.querySelector(".fav").onclick=(e)=>{
e.stopPropagation();
saveFav(m);
};

container.appendChild(div);
});

rowsContainer.appendChild(section);
}

async function loadAll(){
rowsContainer.innerHTML="";
for(const cat of categories){
const data=await fetchData(cat.url);
if(cat.name==="Populares")setHero(data.results[0]);
createRow(cat.name,data.results);
}
}

async function openTrailer(id){
const data=await fetchData(`${BASE}/movie/${id}/videos?api_key=${API_KEY}`);
const video=data.results.find(v=>v.type==="Trailer");
if(video){
document.getElementById("modal").style.display="flex";
document.getElementById("trailer").src=`https://www.youtube.com/embed/${video.key}`;
}
}

function closeModal(){
document.getElementById("modal").style.display="none";
document.getElementById("trailer").src="";
}

function saveFav(movie){
let favs=JSON.parse(localStorage.getItem("favs"))||[];
favs.push(movie);
localStorage.setItem("favs",JSON.stringify(favs));
alert("Añadido a favoritos");
}

search.addEventListener("input",async()=>{
const q=search.value;
if(q){
const data=await fetchData(`${BASE}/search/movie?api_key=${API_KEY}&query=${q}`);
rowsContainer.innerHTML="";
createRow("Resultados",data.results);
}else loadAll();
});

loadAll();
</script>

</body>
</html>
